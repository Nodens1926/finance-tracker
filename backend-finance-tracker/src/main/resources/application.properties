spring.main.allow-circular-references=true

# Server
server.port=8080

# H2 Database
spring.datasource.url=jdbc:h2:mem:financedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Data initialization - ?????: ???????? ?????????????
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql
spring.jpa.defer-datasource-initialization=true

# JWT
jwt.secret=mySecretKeyForJWTTokenGenerationAndValidation2024SpringBootApplication
jwt.expiration=900000
jwt.refresh-expiration=604800000

# CORS Configuration
cors.allowed-origins=http://localhost:3000
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true

# S3 Configuration (MinIO or AWS S3)
aws.s3.endpoint=http://localhost:9000
aws.s3.access-key=minioadmin
aws.s3.secret-key=minioadmin
aws.s3.region=us-east-1
aws.s3.bucket=finance-tracker
aws.s3.url-expiration-minutes=15

# Max file size
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ExchangeRate API (free tier: https://exchangerate.host)
exchange.api.base-url=https://api.exchangerate.host
exchange.api.timeout=5000
exchange.api.retry-attempts=3
exchange.api.retry-delay=1000

spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

