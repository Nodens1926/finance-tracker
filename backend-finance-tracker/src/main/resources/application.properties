# Spring Boot main
spring.main.allow-circular-references=true

# Server
server.port=8080

# H2 Database
spring.datasource.url=jdbc:h2:mem:financedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Data initialization
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql
spring.jpa.defer-datasource-initialization=true

# JWT - ???????? ? ?????????? ?????????
jwt.secret=${JWT_SECRET:mySecretKeyForJWTTokenGenerationAndValidation2024SpringBootApplication}
jwt.expiration=${JWT_EXPIRATION:900000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# CORS Configuration - ???????? ? ?????????? ?????????
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true

# S3 Configuration (MinIO or AWS S3) - ???????? ? ?????????? ?????????
aws.s3.endpoint=${AWS_S3_ENDPOINT:http://localhost:9000}
aws.s3.access-key=${AWS_ACCESS_KEY:minioadmin}
aws.s3.secret-key=${AWS_SECRET_KEY:minioadmin}
aws.s3.region=${AWS_REGION:us-east-1}
aws.s3.bucket=${AWS_BUCKET:finance-tracker}
aws.s3.url-expiration-minutes=${AWS_URL_EXPIRATION:15}

# Max file size
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ExchangeRate API - ???????? ? ?????????? ?????????
exchange.api.base-url=${EXCHANGE_API_URL:https://api.exchangerate.host}
exchange.api.timeout=${EXCHANGE_TIMEOUT:5000}
exchange.api.retry-attempts=${EXCHANGE_RETRY_ATTEMPTS:3}
exchange.api.retry-delay=${EXCHANGE_RETRY_DELAY:1000}

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Actuator (healthcheck)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always